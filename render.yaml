# Render Blueprint — deploys the FULL Streambert app (same code running on
# Vision) to a public URL, auto-building from GitHub on every push to main.
#
# This runs the real backend (Fastify + SQLite), so unlike the Vercel static
# site it has: login, the admin panel, user accounts, per-user sync, and — with
# STREAMBERT_VZY enabled — the Videasy /vzy proxy.
#
# NOTE: the persistent disk (which holds the user database) requires a paid
# instance — the `free` plan does not support disks, so accounts would reset on
# every deploy. `starter` (~$7/mo) keeps it always-on with durable data.
#
# One-time setup after connecting this repo as a Render Blueprint:
#   - Set STREAMBERT_TMDB_TOKEN   (the same eyJ… token already in Vercel)
#   - Set STREAMBERT_ADMIN_PASSWORD (first-run bootstraps the admin account)
# COOKIE_SECRET is generated by Render automatically.

services:
  - name: streambert
    type: web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter          # 'free' has NO persistent disk → accounts would not survive deploys
    healthCheckPath: /
    autoDeploy: true
    disk:
      name: streambert-data
      mountPath: /data     # matches STREAMBERT_DATA in the Dockerfile (streambert.db, secure store)
      sizeGB: 1
    envVars:
      - key: STREAMBERT_COOKIE_SECRET
        generateValue: true          # Render mints a strong secret; app fail-fasts without it
      - key: STREAMBERT_SECURE_COOKIES
        value: "1"                    # Render terminates TLS and sets X-Forwarded-Proto
      - key: STREAMBERT_TMDB_TOKEN
        sync: false                   # set in the Render dashboard (not stored in this public repo)
      - key: STREAMBERT_ADMIN_PASSWORD
        sync: false                   # set in the dashboard; bootstraps the first admin
